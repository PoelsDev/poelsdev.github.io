<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Goofy Knight and the Silly Princess</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#2C1A0E;}
#app{display:flex;flex-direction:column;width:100%;height:100%;background:#2C1A0E;}
#story-title{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #4A2E10;flex-shrink:0;}
#title-text{font-family:Georgia,serif;font-style:italic;font-size:15px;color:#F0D8A8;letter-spacing:0.08em;flex:1;text-align:center;}
#prev-chapter-btn{font-family:Georgia,serif;font-size:12px;background:#4A2E10;border:1px solid #6A4520;border-radius:3px;color:#E8C890;padding:5px 12px;cursor:pointer;white-space:nowrap;}
#prev-chapter-btn:hover{background:#5A3A18;}
#next-chapter-btn{font-family:Georgia,serif;font-size:12px;background:#4A2E10;border:1px solid #6A4520;border-radius:3px;color:#E8C890;padding:5px 12px;cursor:pointer;white-space:nowrap;}
#next-chapter-btn:hover{background:#5A3A18;}
#main{display:flex;flex-direction:row;flex:1;min-height:0;}
#left{flex:0 0 62%;display:flex;flex-direction:column;border-right:1px solid #4A2E10;min-width:0;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#1E1008;min-height:0;overflow:hidden;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;}
#scene-bar{padding:7px 14px;background:#3A1F08;border-top:1px solid #4A2E10;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
#scene-name{font-family:Georgia,serif;font-size:12px;color:#E8C890;font-style:italic;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#nav-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.nbtn{background:#4A2E10;border:1px solid #6A4520;border-radius:3px;color:#E8C890;font-family:Georgia,serif;font-size:12px;padding:4px 12px;cursor:pointer;}
.nbtn:hover{background:#5A3A18;}
.nbtn:disabled{opacity:0.3;cursor:default;}
#dots-row{display:flex;gap:4px;}
.dot{width:5px;height:5px;border-radius:50%;background:#6A4520;}
.dot.on{background:#E8C890;}
#right{flex:1;display:flex;flex-direction:column;background:#F5EDD6;overflow:hidden;min-width:0;}
#text-header{padding:12px 16px 10px;border-bottom:1px solid #D4C0A0;flex-shrink:0;}
#text-chapter-label{font-family:Georgia,serif;font-size:11px;font-style:italic;color:#8B5E2A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
#text-chapter-title{font-family:Georgia,serif;font-size:13px;font-style:italic;color:#5A3010;font-weight:bold;}
#story-scroll{flex:1;overflow-y:auto;padding:14px 16px;min-height:0;scrollbar-width:thin;scrollbar-color:#C8A860 #F5EDD6;}
#story-scroll::-webkit-scrollbar{width:5px;}
#story-scroll::-webkit-scrollbar-thumb{background:#C8A860;border-radius:3px;}
#story-text p{font-family:Georgia,serif;font-size:14px;line-height:1.9;color:#3A2010;margin-bottom:0.9em;}
#story-text p.hl{background:#FFF0B0;border-left:2px solid #C8A040;padding:2px 6px;border-radius:0 2px 2px 0;}
a {
  color: inherit;
  text-decoration: inherit;
}
</style>
</head>
<body>
<div id="app">
  <div id="story-title">
    <div style="flex:0 0 110px;display:flex;justify-content:flex-start;">
      <a href="chapter1.html"><button id="prev-chapter-btn">&larr; Previous chapter</button></a>
    </div>
    <div id="title-text">The Goofy Knight and the Silly Princess</div>
    <div style="flex:0 0 110px;display:flex;justify-content:flex-end;">
      <button id="next-chapter-btn">Next chapter &rarr;</button>
    </div>
  </div>
  <div id="main">
    <div id="left">
      <div id="canvas-wrap"><canvas id="c"></canvas></div>
      <div id="scene-bar">
        <div id="scene-name"></div>
        <div id="nav-btns">
          <button class="nbtn" id="prev">&#8592;</button>
          <div id="dots-row"></div>
          <button class="nbtn" id="next">&#8594;</button>
        </div>
      </div>
    </div>
    <div id="right">
      <div id="text-header">
        <div id="text-chapter-label">Chapter II</div>
        <div id="text-chapter-title">In which the Knight arrives at the castle, the Princess tries not to giggle, and the tablecloth receives an uninvited portion of the main course</div>
      </div>
      <div id="story-scroll"><div id="story-text"></div></div>
    </div>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
var W = 240, H = 150;
canvas.width = W; canvas.height = H;

function sizeCanvas(){
  var wrap = document.getElementById('canvas-wrap');
  var aw = wrap.clientWidth - 16, ah = wrap.clientHeight - 16;
  var scale = Math.min(Math.floor(aw/W), Math.floor(ah/H));
  if(scale < 1) scale = 1;
  canvas.style.width = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}

var C = {
  skyNight:'#12101E', skyEve:'#1E1428', skyDusk:'#2A1E38',
  moonC:'#FFF0C0', star:'#FFFACC',
  cobL:'#C8B898', cobD:'#A09070', cobLine:'#806040',
  grassG:'#5CA840', grassD:'#3E8228',
  bCream:'#F0DFB8', bTan:'#DCC898', bDark:'#9A8050',
  roofR:'#C03020', roofB:'#7A3800',
  winY:'#FFE870', winO:'#FFB840',
  doorB:'#7A4A28', wood:'#D4A860', woodD:'#8A6020',
  // castle colours
  stone:'#C0B090', stoneD:'#A09070', stoneL:'#D8C8A0', stoneDk:'#807050',
  cFlag:'#C83020', cFlagB:'#1A3A80',
  cGate:'#5A3808', cGateD:'#3A2005',
  cTorch:'#FFD060', cTorchO:'#FF8020',
  // room / interior
  roomW:'#EDD8A8', roomS:'#D4BC88', roomFloor:'#C8A060', roomFloorD:'#8A6820',
  tableW:'#F8F4EC', tableC:'#E0D8C8', tableD:'#C0B898',
  tablecloth:'#F5F0E8', tableclothS:'#E8E0D0',
  chair:'#8A5020', chairD:'#6A3810',
  plate:'#E8E0D0', plateD:'#C8C0B0', food:'#C85020', foodD:'#A03818',
  candle:'#FFE870', candleO:'#FF9020',
  tapestry1:'#8A2030', tapestry2:'#1A3A60', tapestryG:'#C8A020',
  curtainR:'#8B0010', curtainG:'#C89020',
  // characters
  kSilver:'#C8D0DC', kSilD:'#9AA2B0', kGold:'#D8B840',
  kBlonde:'#F8C838', kBlondeD:'#D0980C',
  kSkin:'#F8C8A0', kSkinS:'#E0A070', kRed:'#C83020',
  pHair:'#3A1800', pHairH:'#622808',
  pSkin:'#FCCCA0', pSkinS:'#E8A870',
  pPurp:'#7830C0', pPurpL:'#A060E0', pPurpD:'#501890', pGold:'#D8A010',
  // king & queen
  kingRobe:'#1A3A80', kingRobeL:'#2A5AA0', kingRobeD:'#0A2050',
  kingCrown:'#D8A010', kingSkin:'#E8C090',
  queenRobe:'#8A1A30', queenRobeL:'#B02848', queenRobeD:'#5A0A1A',
  queenCrown:'#D8A010', queenHair:'#F0D878',
  napkin:'#F0ECD8',
  // lamp / environment
  lpost:'#604818', lamp:'#FFE890',
  trous:'#C8D4E0',
  sweat:'#A0C8E0',
};

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
function pt(x,y,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),1,1);}
function circ(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function tri(x1,y1,x2,y2,x3,y3,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.fill();}
function skyGrad(y0,y1,r0,g0,b0,r1,g1,b1){
  for(var y=y0;y<y1;y++){
    var t=(y-y0)/(y1-y0);
    ctx.fillStyle='rgb('+Math.round(r0+(r1-r0)*t)+','+Math.round(g0+(g1-g0)*t)+','+Math.round(b0+(b1-b0)*t)+')';
    ctx.fillRect(0,y,W,1);
  }
}
function cobbles(x,y,w,h){
  px(x,y,w,h,C.cobL);
  for(var cy=y;cy<y+h;cy+=5){
    var off=(Math.floor((cy-y)/5)%2===0)?0:4;
    for(var cx2=x+off;cx2<x+w;cx2+=9){
      px(cx2,cy,7,4,C.cobD);px(cx2,cy+4,7,1,C.cobLine);px(cx2+7,cy,1,4,C.cobLine);
    }
  }
}
function winLit(x,y,w,h){
  px(x,y,w,h,'#604010');px(x+1,y+1,w-2,h-2,C.winY);
  px(x+1,y+1,w-2,2,C.winO);px(x+1,y+1,1,h-2,'#FFF8B0');
  px(x+(w>>1),y,1,h,'#604010');px(x,y+(h>>1),w,1,'#604010');
}
function lamp(x,y){
  px(x,y,3,24,C.lpost);px(x-4,y,11,4,C.lpost);px(x-3,y+1,9,3,C.lamp);circ(x+1,y-2,4,C.lamp);
}
function torch(x,y){
  px(x,y,3,10,C.woodD);px(x-1,y,5,3,C.woodD);
  circ(x+1,y-1,3,C.cTorch);circ(x+1,y-1,2,C.cTorchO);pt(x+1,y-3,C.candle);
  ctx.fillStyle='rgba(255,180,60,0.1)';ctx.beginPath();ctx.ellipse(x+1,y+2,8,5,0,0,Math.PI*2);ctx.fill();
}

// knight function (same design as ch1)
function knight(x,y){
  px(x+3,y+21,6,4,C.kSilD);px(x+10,y+21,6,4,C.kSilD);
  px(x+4,y+22,4,2,'#707880');px(x+11,y+22,4,2,'#707880');
  px(x+3,y+14,6,8,C.kSilver);px(x+10,y+14,6,8,C.kSilver);
  px(x+4,y+18,4,3,C.kGold);px(x+11,y+18,4,3,C.kGold);
  px(x+2,y+20,3,2,C.kSilD);px(x+14,y+20,3,2,C.kSilD);
  px(x+1,y+8,16,7,C.kSilver);px(x+4,y+9,9,5,C.kSilD);
  px(x+5,y+10,6,3,C.kGold);px(x+6,y+11,4,1,C.winY);
  px(x,y+8,3,7,C.kSilver);px(x+15,y+8,3,7,C.kSilver);
  px(x,y+14,3,4,C.kSilD);px(x+15,y+14,3,4,C.kSilD);
  px(x+6,y+6,6,3,C.kSkin);
  px(x+3,y,12,7,C.kSilver);px(x+4,y+1,10,5,C.kSilD);
  px(x+4,y+3,10,3,C.kGold);px(x+5,y+4,8,1,C.winY);
  px(x+2,y+3,3,5,C.kBlonde);px(x+13,y+3,3,5,C.kBlonde);
  px(x+2,y+2,2,2,C.kBlondeD);px(x+14,y+2,2,2,C.kBlondeD);
  px(x+8,y-2,3,2,C.kRed);
  pt(x+7,y+5,'#201008');pt(x+11,y+5,'#201008');
}

function princess(x,y){
  px(x+2,y+16,14,9,C.pPurp);px(x,y+19,18,7,C.pPurpD);
  px(x+2,y+24,14,1,C.pGold);
  px(x+1,y+22,2,3,C.pPurpD);px(x+15,y+22,2,3,C.pPurpD);
  px(x+4,y+9,10,8,C.pPurp);px(x+5,y+10,8,5,C.pPurpL);
  px(x+2,y+10,3,6,C.pPurp);px(x+13,y+10,3,6,C.pPurp);
  px(x+3,y+14,2,3,C.pSkin);px(x+13,y+14,2,3,C.pSkin);
  // neck
  px(x+6,y+7,6,3,C.pSkin);
  // face drawn first — clear skin block
  px(x+4,y+1,10,7,C.pSkin);
  // eyes and mouth on face
  pt(x+6,y+3,'#201008');pt(x+10,y+3,'#201008');
  px(x+6,y+5,4,1,C.pSkinS);
  // hair drawn after face — top and sides only
  px(x+4,y-3,10,5,C.pHair);px(x+5,y-3,4,3,C.pHairH);
  px(x+3,y+1,2,8,C.pHair);px(x+13,y+1,2,8,C.pHair);
  // crown
  px(x+5,y-4,8,2,C.pGold);
  px(x+5,y-5,1,2,C.pGold);px(x+7,y-6,3,3,C.pGold);px(x+11,y-5,1,2,C.pGold);
}

// king: seated, blue robe, crown
function king(x,y){
  // robe / body
  px(x+1,y+8,16,20,C.kingRobe);px(x+3,y+9,12,16,C.kingRobeL);
  px(x,y+8,2,18,C.kingRobe);px(x+16,y+8,2,18,C.kingRobe);
  // ermine trim
  px(x+1,y+8,16,3,C.stoneL);px(x+2,y+9,12,2,'#F8F4F0');
  for(var d=0;d<6;d++){pt(x+3+d*2,y+10,'#404040');}
  // legs
  px(x+3,y+26,5,6,C.kingRobe);px(x+10,y+26,5,6,C.kingRobe);
  px(x+3,y+31,5,3,C.stoneDk);px(x+10,y+31,5,3,C.stoneDk);
  // head
  px(x+4,y+2,10,7,C.kingSkin);
  pt(x+6,y+4,'#201008');pt(x+10,y+4,'#201008');
  px(x+7,y+6,4,1,'#C07050');
  // beard
  px(x+4,y+7,10,3,'#C0A880');px(x+5,y+8,8,2,'#D0B890');
  // crown
  px(x+3,y,12,3,C.kingCrown);
  px(x+3,y-1,2,2,C.kingCrown);px(x+7,y-2,3,3,C.kingCrown);px(x+12,y-1,2,2,C.kingCrown);
  pt(x+8,y-2,'#FFE860');
  // arms
  px(x,y+10,2,7,C.kingRobe);px(x+16,y+10,2,7,C.kingRobe);
  px(x,y+16,3,3,C.kingSkin);px(x+15,y+16,3,3,C.kingSkin);
}

// queen: seated, red robe, crown, light blonde-grey hair
function queen(x,y){
  // body / robe
  px(x+1,y+14,16,20,C.queenRobe);px(x+3,y+15,12,16,C.queenRobeL);
  px(x,y+14,2,18,C.queenRobe);px(x+16,y+14,2,18,C.queenRobe);
  // ermine collar
  px(x+1,y+14,16,3,C.stoneL);px(x+2,y+15,12,2,'#F8F4F0');
  for(var d=0;d<6;d++){pt(x+3+d*2,y+16,'#404040');}
  // legs
  px(x+3,y+32,5,6,C.queenRobe);px(x+10,y+32,5,6,C.queenRobe);
  px(x+3,y+37,5,3,C.stoneDk);px(x+10,y+37,5,3,C.stoneDk);
  // arms
  px(x,y+16,2,7,C.queenRobe);px(x+16,y+16,2,7,C.queenRobe);
  px(x,y+22,3,3,C.kingSkin);px(x+15,y+22,3,3,C.kingSkin);
  // neck — narrow
  px(x+6,y+12,5,2,C.kingSkin);
  // hair drawn FIRST so face overwrites it
  px(x+3,y+2,12,5,C.queenHair);px(x+4,y+2,5,3,'#F8E898');
  px(x+2,y+6,3,9,C.queenHair);px(x+13,y+6,3,9,C.queenHair);
  // face drawn over hair
  px(x+4,y+6,10,7,C.kingSkin);
  px(x+6,y+11,6,1,'#C07050');
  // eyes drawn last so nothing overwrites them
  pt(x+6,y+8,'#201008');pt(x+9,y+8,'#201008');
  // crown drawn last
  px(x+4,y,10,3,C.queenCrown);
  px(x+4,y-1,2,2,C.queenCrown);px(x+8,y-2,3,3,C.queenCrown);px(x+13,y-1,2,2,C.queenCrown);
}

// ---- SCENES ----

function drawS0(){
  // Knight's chambers — nervous preparation, evening light
  // warm interior
  px(0,0,W,H,C.roomW);
  for(var wy=0;wy<H;wy+=8){for(var wx=0;wx<W;wx+=20){px(wx,wy,18,7,C.roomS);}}
  // floor
  for(var fx=0;fx<W;fx+=14){px(fx,110,13,40,C.roomFloor);px(fx+13,110,1,40,C.roomFloorD);}
  px(0,110,W,2,'rgba(0,0,0,0.1)');
  // window with evening sky — clipped to window bounds only
  px(W-50,15,36,50,'#604010');px(W-49,16,34,48,'#2A1428');
  ctx.save();ctx.beginPath();ctx.rect(W-49,16,34,48);ctx.clip();
  skyGrad(16,64,40,20,60,100,60,130);
  ctx.restore();
  // re-draw window frame over sky
  px(W-50,15,36,2,'#604010');px(W-50,63,36,2,'#604010');
  px(W-50,15,2,50,'#604010');px(W-16,15,2,50,'#604010');
  px(W-32,15,2,50,'#604010');px(W-50,39,36,2,'#604010');
  // stars through window
  pt(W-44,22,C.star);pt(W-28,20,C.star);pt(W-20,30,C.star);
  // moon through window
  circ(W-25,28,5,C.moonC);circ(W-23,26,4,'#2A1428');
  // wardrobe left
  px(5,15,30,95,C.woodD);px(6,16,28,93,C.wood);
  px(7,17,26,2,C.woodD);px(7,88,26,2,C.woodD);
  px(19,16,2,94,C.woodD);
  px(10,35,8,8,'#6A4010');px(20,35,8,8,'#6A4010');
  px(12,38,2,2,C.kGold);px(22,38,2,2,C.kGold);
  // armour pieces on stand (centre-left)
  px(50,55,18,5,C.kSilver);  // breastplate
  px(51,56,16,3,C.kSilD);px(53,57,10,2,C.kGold);
  px(48,60,22,20,C.kSilver); // stand body
  px(49,61,20,16,C.kSilD);
  px(46,79,26,3,C.woodD);    // stand base
  // old trousers on floor (rejected)
  px(42,108,18,5,C.trous);px(43,109,16,3,C.kSilD);
  px(62,106,16,5,C.trous);px(63,107,12,3,C.kSilD);
  // mirror on wall
  px(88,18,22,30,'#604010');px(89,19,20,28,'#A8C8D8');
  px(89,19,20,2,'#C0D8E8');px(89,19,1,28,'#C0D8E8');
  px(90,19,18,1,'#604010');px(90,46,18,1,'#604010');
  px(90,32,18,1,'rgba(255,255,255,0.2)');
  // knight looking in mirror — nervous expression
  knight(95,82);
  // reflection in mirror (slightly offset, same knight)
  ctx.globalAlpha=0.5;
  px(91,22,16,22,C.kSilver); // rough reflection shape
  px(93,23,12,18,C.kSilD);px(96,20,5,5,C.kBlonde);
  ctx.globalAlpha=1.0;
  // sweat drops
  pt(117,77,C.sweat);pt(119,74,C.sweat);pt(115,73,C.sweat);
  // small table with goblet
  px(135,90,24,4,C.woodD);px(133,94,28,16,C.wood);
  px(143,82,8,9,C.stoneD);px(144,83,6,7,C.stone);px(141,88,10,2,C.stoneD);
  // candle on table
  px(155,84,4,7,C.stoneL);px(156,85,2,5,'#F8F0E0');
  circ(157,83,2,C.candle);pt(157,81,C.candleO);
  // letter/invitation on table
  px(135,86,22,5,'#F5EDD6');px(136,87,20,3,'#E8DCC8');
  px(138,87,6,1,'#8A7050');px(138,89,10,1,'#8A7050');
  // shoes being polished
  px(170,108,16,8,C.stoneDk);px(171,109,14,6,'#1A1008');px(172,110,12,4,'#2A2010');
  // polishing cloth next to shoe
  px(188,110,10,6,'#D0C0A0');
}

function drawS1(){
  // Arriving at castle gates — evening, grand castle
  skyGrad(0,75,25,15,45,60,40,80);
  // stars
  [[15,8],[30,5],[50,12],[80,4],[100,9],[125,6],[145,11],[170,8],[195,5],[215,12]].forEach(function(s){pt(s[0],s[1],C.star);});
  circ(200,18,7,C.moonC);circ(203,16,5,C.skyNight);
  // ground / cobbles
  cobbles(0,110,W,40);
  // castle — grand, takes up most of scene
  // main wall
  px(20,40,200,85,C.stone);
  px(20,40,200,5,C.stoneL);
  // stone texture
  for(var sy=45;sy<115;sy+=10){
    var soff=(Math.floor((sy-45)/10)%2===0)?0:15;
    for(var sx=20+soff;sx<220;sx+=30){
      px(sx,sy,28,9,C.stoneD);px(sx,sy+9,28,1,C.stoneDk);px(sx+28,sy,1,9,C.stoneDk);

var storyParas = [
  'There are many things a Knight trains for. Meeting the parents of the woman he loves, it turns out, is not one of them.',
  '\u201cCome for dinner,\u201d she had said, easily, the way you might suggest stopping for a pastry on the way home. \u201cMy parents would love to meet you.\u201d',
  'The Knight had said yes. Of course he had said yes. He was brave. He had faced dragons. He had navigated swamps. He had stared down a very stubborn goat on a toll bridge and not flinched once.',
  'He spent the entire week before dinner in a state of quiet, dignified panic.',
  'It was not, he told himself firmly, a big deal. They were just her parents. Ordinary people. The fact that her father happened to be the King of Antwerpshire was entirely beside the point. The fact that her mother was the Queen was similarly irrelevant. He was a Knight. He dined with important people all the time.',
  'He had never actually dined with important people.',
  'On the evening itself, he arrived at the castle gates precisely on time, having changed his outfit twice and then changed back to the first one, and stood for a moment looking up at the towers and the flags and the general enormity of the whole enterprise. It was a magnificent castle. Grand, beautiful, warm light spilling from tall windows into the evening air.',
  'He straightened his armour, cleared his throat, and knocked.',
  'The Princess opened the door herself, which he had not expected, and she was smiling in a way that was entirely warm and also, he noticed, contained just the faintest flicker of anticipation. As if she was already looking forward to something.',
  '\u201cYou look terrified,\u201d she said cheerfully.',
  '\u201cI look composed,\u201d said the Knight.',
  '\u201cYou\u2019re gripping your helmet so hard your knuckles have gone white.\u201d He looked down. They had. He loosened his grip. \u201cCome in,\u201d she said, and he could hear her trying not to laugh, and he followed her inside.',
  'The King and Queen were in the great hall, and this was the moment the Knight had been mentally preparing for all week \u2014 the formal assessment, the weighing up, the careful parental scrutiny he had been bracing himself against.',
  'The King looked up from his chair and said, \u201cAh, you must be the Knight. Drink?\u201d',
  'The Queen smiled and said, \u201cSit down, sit down, dinner\u2019s nearly ready.\u201d',
  'And that was that.',
  'There was no scrutiny. No formal assessment. No weighing up. They were just \u2014 people. Warm, normal, completely unbothered people who happened to live in a very large castle and seemed entirely uninterested in making him feel anything other than welcome.',
  'This, somehow, did not make the Knight less nervous. If anything, it made him more nervous, in the specific way that happens when you have prepared extensively for a storm and the weather turns out to be perfectly pleasant and you have no idea what to do with all that prepared nervousness.',
  'He directed it, mostly, at the dinner table.',
  'The table was long and beautifully set, with a white tablecloth so pristine it seemed to be daring someone to ruin it. The Knight sat down, placed his hands carefully in his lap, and resolved to be perfectly normal.',
  'The King talked about the kingdom. The Queen asked pleasant questions. The Princess sat across from him, composed and attentive, though she had adopted a particular expression the Knight was beginning to recognise \u2014 chin slightly down, eyes slightly bright, the expression of someone sitting on a laugh and sitting on it very firmly indeed.',
  'He was doing well. He was being perfectly normal. The conversation flowed, the wine was poured, and the main course arrived \u2014 a magnificent roast, fit for, well, a king.',
  '\u201cSo,\u201d said the King pleasantly, \u201chow did you two first meet?\u201d',
  'It was a simple question. A friendly question. The Knight had the answer ready \u2014 he had thought about this, he knew this story, he had lived this story \u2014 and he opened his mouth to tell it while simultaneously lifting his fork toward his mouth and misjudging the distance between the two by quite a significant margin.',
  'The fork arrived. His mouth did not. A portion of the main course, caught in the middle of this miscommunication, made a dignified descent onto the white tablecloth.',
  'There was a brief silence.',
  '\u201cWe met\u2014\u201d said the Knight, with tremendous composure, as if nothing had happened. He did not look down. He looked directly at the King with the focused expression of a man who has decided that if he does not acknowledge something, it will cease to exist. He told the story carefully, calmly, and at no point mentioned the fork.',
  'The King nodded warmly. \u201cWonderful.\u201d',
  'The Queen reached over and placed a napkin gently over the affected area of the tablecloth, with the serene efficiency of someone who had seen far stranger things and was not going to make a fuss about any of them. She said nothing. She simply smiled and refilled his glass.',
  'The Knight finally allowed himself to glance at the Princess.',
  'She was staring very intently at a spot somewhere above his left shoulder. Her jaw was tight. Her eyes were watering very slightly. She was, by any reasonable measure, about thirty seconds from completely losing the battle she was currently fighting with herself.',
  'He looked away quickly.',
  'Dinner continued. The King and Queen asked more questions, laughed easily, told stories of their own, and treated the Knight throughout with a warmth so genuine and uncomplicated that by the time dessert arrived he had almost \u2014 almost \u2014 relaxed.',
  'It was only later, walking back through the castle courtyard toward the gate, that the Princess finally let it out \u2014 a laugh she had clearly been saving for some time, bright and helpless and completely delighted.',
  '\u201cYou missed your own mouth,\u201d she said.',
  '\u201cThe fork was at an unusual angle,\u201d said the Knight.',
  '\u201cIt was a completely normal angle.\u201d',
  '\u201cI was gesturing.\u201d',
  '\u201cYou weren\u2019t gesturing. You were just nervous.\u201d',

  '\u201cThey liked you, you know,\u201d she said, once she\u2019d recovered. \u201cThey really did.\u201d \u201cI spilled food on their tablecloth.\u201d \u201cThey didn\u2019t care even slightly.\u201d',

window.onload = function(){
  var textEl = document.getElementById('story-text');
  for(var pi=0; pi<storyParas.length; pi++){
    var pel = document.createElement('p');
    pel.id = 'para'+pi;
    pel.textContent = storyParas[pi];
    textEl.appendChild(pel);
  }
  var dotsRow = document.getElementById('dots-row');
  for(var d=0; d<scenes.length; d++){
    var de = document.createElement('div');
    de.className = 'dot'+(d===0?' on':'');
    dotsRow.appendChild(de);
  }
  var cur = 0;
  function render(i){
    ctx.clearRect(0,0,W,H);
    scenes[i].fn();
    document.getElementById('scene-name').textContent = scenes[i].label;
    document.getElementById('prev').disabled = (i===0);
    document.getElementById('next').disabled = (i===scenes.length-1);
    var allDots = document.querySelectorAll('.dot');
    for(var j=0;j<allDots.length;j++) allDots[j].classList.toggle('on',j===i);
    var allP = document.querySelectorAll('#story-text p');
    for(var k=0;k<allP.length;k++) allP[k].classList.remove('hl');
    for(var h=scenes[i].para;h<=scenes[i].paraEnd;h++){
      if(allP[h]) allP[h].classList.add('hl');
    }
    if(allP[scenes[i].para]) allP[scenes[i].para].scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  document.getElementById('prev').onclick = function(){if(cur>0){cur--;render(cur);}};
  document.getElementById('next').onclick = function(){if(cur<scenes.length-1){cur++;render(cur);}};
  sizeCanvas();
  render(0);
  window.addEventListener('resize', sizeCanvas);
};
</script>
