<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Goofy Knight and the Silly Princess</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#2C1A0E;}
#app{display:flex;flex-direction:column;width:100%;height:100%;background:#2C1A0E;}
#story-title{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #4A2E10;flex-shrink:0;}
#title-text{font-family:Georgia,serif;font-style:italic;font-size:15px;color:#F0D8A8;letter-spacing:0.08em;flex:1;text-align:center;}
#prev-chapter-btn{font-family:Georgia,serif;font-size:12px;background:#4A2E10;border:1px solid #6A4520;border-radius:3px;color:#E8C890;padding:5px 12px;cursor:pointer;white-space:nowrap;}
#prev-chapter-btn:hover{background:#5A3A18;}
#next-chapter-btn{font-family:Georgia,serif;font-size:12px;background:#4A2E10;border:1px solid #6A4520;border-radius:3px;color:#E8C890;padding:5px 12px;cursor:pointer;white-space:nowrap;}
#next-chapter-btn:hover{background:#5A3A18;}
#main{display:flex;flex-direction:row;flex:1;min-height:0;}
#left{flex:0 0 62%;display:flex;flex-direction:column;border-right:1px solid #4A2E10;min-width:0;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#1E1008;min-height:0;overflow:hidden;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;}
#scene-bar{padding:7px 14px;background:#3A1F08;border-top:1px solid #4A2E10;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
#scene-name{font-family:Georgia,serif;font-size:12px;color:#E8C890;font-style:italic;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#nav-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.nbtn{background:#4A2E10;border:1px solid #6A4520;border-radius:3px;color:#E8C890;font-family:Georgia,serif;font-size:12px;padding:4px 12px;cursor:pointer;}
.nbtn:hover{background:#5A3A18;}
.nbtn:disabled{opacity:0.3;cursor:default;}

.dot{width:5px;height:5px;border-radius:50%;background:#6A4520;}
.dot.on{background:#E8C890;}
#right{flex:1;display:flex;flex-direction:column;background:#F5EDD6;overflow:hidden;min-width:0;}
#text-header{padding:12px 16px 10px;border-bottom:1px solid #D4C0A0;flex-shrink:0;}
#text-chapter-label{font-family:Georgia,serif;font-size:11px;font-style:italic;color:#8B5E2A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
#text-chapter-title{font-family:Georgia,serif;font-size:13px;font-style:italic;color:#5A3010;font-weight:bold;}
#story-scroll{flex:1;overflow-y:auto;padding:14px 16px;min-height:0;scrollbar-width:thin;scrollbar-color:#C8A860 #F5EDD6;}
#story-scroll::-webkit-scrollbar{width:5px;}
#story-scroll::-webkit-scrollbar-thumb{background:#C8A860;border-radius:3px;}
#story-text p{font-family:Georgia,serif;font-size:14px;line-height:1.9;color:#3A2010;margin-bottom:0.9em;}
#story-text p.hl{background:#FFF0B0;border-left:2px solid #C8A040;padding:2px 6px;border-radius:0 2px 2px 0;}
a{color:inherit;text-decoration:inherit;}
</style>
</head>
<body>
<div id="app">
  <div id="story-title">
    <div style="flex:0 0 110px;display:flex;justify-content:flex-start;">
      <a href="chapter2.html"><button id="prev-chapter-btn">&larr; Previous chapter</button></a>
    </div>
    <div id="title-text">The Goofy Knight and the Silly Princess</div>
    <div style="flex:0 0 110px;display:flex;justify-content:flex-end;">
      <button id="next-chapter-btn">Next chapter &rarr;</button>
    </div>
  </div>
  <div id="main">
    <div id="left">
      <div id="canvas-wrap"><canvas id="c"></canvas></div>
      <div id="scene-bar">
        <div id="scene-name"></div>
        <div id="nav-btns">
          <button class="nbtn" id="prev">&#8592;</button>
          <div id="dots-row"></div>
          <button class="nbtn" id="next">&#8594;</button>
        </div>
      </div>
    </div>
    <div id="right">
      <div id="text-header">
        <div id="text-chapter-label">Chapter III</div>
        <div id="text-chapter-title">The Curse of Ghenta the Grim</div>
      </div>
      <div id="story-scroll"><div id="story-text"></div></div>
    </div>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
var W = 240, H = 150;
canvas.width = W; canvas.height = H;

function sizeCanvas(){
  var wrap = document.getElementById('canvas-wrap');
  var aw = wrap.clientWidth - 16, ah = wrap.clientHeight - 16;
  var scale = Math.min(Math.floor(aw/W), Math.floor(ah/H));
  if(scale < 1) scale = 1;
  canvas.style.width = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}

var C = {
  // sky / night
  skyNight:'#12101E', skyEve:'#1E1428', skyDusk:'#2A1E38',
  skyGrey:'#2A2A30', skyGreyD:'#1A1A20',
  moonC:'#FFF0C0', star:'#FFFACC',
  // ground / cobbles
  cobL:'#C8B898', cobD:'#A09070', cobLine:'#806040',
  cobGrey:'#909090', cobGreyD:'#707070', cobGreyLine:'#505050',
  grassG:'#5CA840', grassD:'#3E8228',
  // buildings warm (Antwerpshire)
  bCream:'#F0DFB8', bTan:'#DCC898', bDark:'#9A8050',
  roofR:'#C03020', roofB:'#7A3800',
  winY:'#FFE870', winO:'#FFB840',
  doorB:'#7A4A28', wood:'#D4A860', woodD:'#8A6020',
  // buildings grey (Ghentmoor)
  greyW:'#888888', greyD:'#666666', greyL:'#AAAAAA',
  greyRoof:'#555555', greyWin:'#4A5060', greyWinD:'#363C48',
  // castle / stone
  stone:'#C0B090', stoneD:'#A09070', stoneL:'#D8C8A0', stoneDk:'#807050',
  cFlag:'#C83020', cFlagB:'#1A3A80',
  cGate:'#5A3808', cGateD:'#3A2005',
  cTorch:'#FFD060', cTorchO:'#FF8020',
  // Old University (grey stone, joyless)
  uniW:'#8A8878', uniD:'#6A6858', uniL:'#AAAAAA',
  uniWin:'#303840', uniWinD:'#20282E',
  // interior
  roomW:'#EDD8A8', roomS:'#D4BC88', roomFloor:'#C8A060', roomFloorD:'#8A6820',
  greyRoomW:'#C0BCAC', greyRoomS:'#A8A498', greyRoomFloor:'#989080', greyRoomFloorD:'#787068',
  tableW:'#F8F4EC', tableC:'#E0D8C8', tableD:'#C0B898',
  laundry1:'#E8E4DC', laundry2:'#D8D4CC', laundry3:'#F0EDE8',
  chair:'#8A5020', chairD:'#6A3810',
  candle:'#FFE870', candleO:'#FF9020',
  // characters
  kSilver:'#C8D0DC', kSilD:'#9AA2B0', kGold:'#D8B840',
  kBlonde:'#F8C838', kBlondeD:'#D0980C',
  kSkin:'#F8C8A0', kSkinS:'#E0A070', kRed:'#C83020',
  pHair:'#3A1800', pHairH:'#622808',
  pSkin:'#FCCCA0', pSkinS:'#E8A870',
  pPurp:'#7830C0', pPurpL:'#A060E0', pPurpD:'#501890', pGold:'#D8A010',
  // Ghenta the witch
  witchRobe:'#2A2A3A', witchRobeL:'#3A3A4E', witchRobeD:'#1A1A28',
  witchHair:'#1A1A1A', witchSkin:'#C8A888', witchSkinS:'#A88860',
  staffW:'#4A3010', staffD:'#2A1808',
  staffGlow:'#8020E0', staffGlowL:'#C060FF',
  // frog (Francois)
  frogG:'#4A9030', frogGD:'#2A6018', frogGL:'#6AB840',
  frogBelly:'#A8C870', frogEye:'#F0C820',
  // horse
  horseB:'#7A4A20', horseBD:'#5A3010', horseL:'#A06830',
  horseMane:'#3A1808', horseHoof:'#3A3020',
  // lamp / environment
  lpost:'#604818', lamp:'#FFE890',
  trous:'#C8D4E0', sweat:'#A0C8E0',
  napkin:'#F0ECD8',
};

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
function pt(x,y,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),1,1);}
function circ(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
function tri(x1,y1,x2,y2,x3,y3,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.fill();}
function skyGrad(y0,y1,r0,g0,b0,r1,g1,b1){
  for(var y=y0;y<y1;y++){
    var t=(y-y0)/(y1-y0);
    ctx.fillStyle='rgb('+Math.round(r0+(r1-r0)*t)+','+Math.round(g0+(g1-g0)*t)+','+Math.round(b0+(b1-b0)*t)+')';
    ctx.fillRect(0,y,W,1);
  }
}
function cobbles(x,y,w,h){
  px(x,y,w,h,C.cobL);
  for(var cy=y;cy<y+h;cy+=5){
    var off=(Math.floor((cy-y)/5)%2===0)?0:4;
    for(var cx2=x+off;cx2<x+w;cx2+=9){
      px(cx2,cy,7,4,C.cobD);px(cx2,cy+4,7,1,C.cobLine);px(cx2+7,cy,1,4,C.cobLine);
    }
  }
}
function cobGrey(x,y,w,h){
  px(x,y,w,h,C.cobGrey);
  for(var cy=y;cy<y+h;cy+=5){
    var off=(Math.floor((cy-y)/5)%2===0)?0:4;
    for(var cx2=x+off;cx2<x+w;cx2+=9){
      px(cx2,cy,7,4,C.cobGreyD);px(cx2,cy+4,7,1,C.cobGreyLine);px(cx2+7,cy,1,4,C.cobGreyLine);
    }
  }
}
function winLit(x,y,w,h){
  px(x,y,w,h,'#604010');px(x+1,y+1,w-2,h-2,C.winY);
  px(x+1,y+1,w-2,2,C.winO);px(x+1,y+1,1,h-2,'#FFF8B0');
  px(x+(w>>1),y,1,h,'#604010');px(x,y+(h>>1),w,1,'#604010');
}
function torch(x,y){
  px(x,y,3,10,C.woodD);px(x-1,y,5,3,C.woodD);
  circ(x+1,y-1,3,C.cTorch);circ(x+1,y-1,2,C.cTorchO);pt(x+1,y-3,C.candle);
  ctx.fillStyle='rgba(255,180,60,0.1)';ctx.beginPath();ctx.ellipse(x+1,y+2,8,5,0,0,Math.PI*2);ctx.fill();
}

// Knight sprite (consistent with ch1/ch2)
function knight(x,y){
  px(x+3,y+21,6,4,C.kSilD);px(x+10,y+21,6,4,C.kSilD);
  px(x+4,y+22,4,2,'#707880');px(x+11,y+22,4,2,'#707880');
  px(x+3,y+14,6,8,C.kSilver);px(x+10,y+14,6,8,C.kSilver);
  px(x+4,y+18,4,3,C.kGold);px(x+11,y+18,4,3,C.kGold);
  px(x+2,y+20,3,2,C.kSilD);px(x+14,y+20,3,2,C.kSilD);
  px(x+1,y+8,16,7,C.kSilver);px(x+4,y+9,9,5,C.kSilD);
  px(x+5,y+10,6,3,C.kGold);px(x+6,y+11,4,1,C.winY);
  px(x,y+8,3,7,C.kSilver);px(x+15,y+8,3,7,C.kSilver);
  px(x,y+14,3,4,C.kSilD);px(x+15,y+14,3,4,C.kSilD);
  px(x+6,y+6,6,3,C.kSkin);
  px(x+3,y,12,7,C.kSilver);px(x+4,y+1,10,5,C.kSilD);
  px(x+4,y+3,10,3,C.kGold);px(x+5,y+4,8,1,C.winY);
  px(x+2,y+3,3,5,C.kBlonde);px(x+13,y+3,3,5,C.kBlonde);
  px(x+2,y+2,2,2,C.kBlondeD);px(x+14,y+2,2,2,C.kBlondeD);
  px(x+8,y-2,3,2,C.kRed);
  pt(x+7,y+5,'#201008');pt(x+11,y+5,'#201008');
}

// Princess sprite
function princess(x,y){
  px(x+2,y+16,14,9,C.pPurp);px(x,y+19,18,7,C.pPurpD);
  px(x+2,y+24,14,1,C.pGold);
  px(x+1,y+22,2,3,C.pPurpD);px(x+15,y+22,2,3,C.pPurpD);
  px(x+4,y+9,10,8,C.pPurp);px(x+5,y+10,8,5,C.pPurpL);
  px(x+2,y+10,3,6,C.pPurp);px(x+13,y+10,3,6,C.pPurp);
  px(x+3,y+14,2,3,C.pSkin);px(x+13,y+14,2,3,C.pSkin);
  px(x+6,y+7,6,3,C.pSkin);
  px(x+4,y+1,10,7,C.pSkin);
  pt(x+6,y+3,'#201008');pt(x+10,y+3,'#201008');
  px(x+6,y+5,4,1,C.pSkinS);
  px(x+4,y-3,10,5,C.pHair);px(x+5,y-3,4,3,C.pHairH);
  px(x+3,y+1,2,8,C.pHair);px(x+13,y+1,2,8,C.pHair);
  px(x+5,y-4,8,2,C.pGold);
  px(x+5,y-5,1,2,C.pGold);px(x+7,y-6,3,3,C.pGold);px(x+11,y-5,1,2,C.pGold);
}

// Frog (François) — small, green, self-possessed
function francois(x,y){
  // body
  px(x+1,y+4,8,5,C.frogG);px(x+2,y+5,6,3,C.frogGL);
  // belly
  px(x+2,y+6,6,3,C.frogBelly);
  // head
  px(x+1,y+1,8,4,C.frogG);px(x+2,y+2,6,2,C.frogGL);
  // eyes
  circ(x+2,y+1,1,C.frogG);circ(x+8,y+1,1,C.frogG);
  pt(x+2,y+1,C.frogEye);pt(x+8,y+1,C.frogEye);
  // mouth — slight smirk
  pt(x+4,y+4,'#1A5010');pt(x+5,y+4,'#1A5010');pt(x+6,y+5,'#1A5010');
  // front legs
  px(x,y+6,2,3,C.frogG);px(x+8,y+6,2,3,C.frogG);
  px(x-1,y+8,3,1,C.frogGD);px(x+8,y+8,3,1,C.frogGD);
  // back legs
  px(x,y+8,3,3,C.frogGD);px(x+7,y+8,3,3,C.frogGD);
}

// Witch Ghenta — tall, angular, staff
function ghenta(x,y){
  // robe — tall and angular
  px(x+2,y+12,14,26,C.witchRobe);px(x+3,y+13,12,22,C.witchRobeL);
  px(x,y+15,3,20,C.witchRobe);px(x+15,y+15,3,20,C.witchRobe);
  // pointed hat base and brim
  px(x+1,y+5,16,4,C.witchRobeD);
  // hat cone
  tri(x+4,y-8,x+9,y-16,x+14,y+5,C.witchRobeD);
  // arms — bony
  px(x,y+12,3,10,C.witchRobe);px(x+15,y+12,3,10,C.witchRobe);
  px(x,y+20,3,3,C.witchSkin);px(x+15,y+20,3,3,C.witchSkin);
  // neck
  px(x+6,y+9,5,3,C.witchSkin);
  // face — angular, dissatisfied
  px(x+4,y+3,10,7,C.witchSkin);
  pt(x+6,y+5,'#201008');pt(x+10,y+5,'#201008');
  px(x+5,y+7,7,1,C.witchSkinS); // frown
  pt(x+5,y+7,'#806050');pt(x+11,y+7,'#806050');// downturned corners
  // grey stringy hair
  px(x+3,y+3,2,8,C.witchHair);px(x+13,y+3,2,8,C.witchHair);
  px(x+4,y+3,10,2,C.witchHair);
  // staff (held in right hand)
  px(x+16,y+8,2,30,C.staffW);px(x+17,y+8,1,30,C.staffD);
  // staff orb top
  circ(x+17,y+7,4,C.staffGlow);circ(x+17,y+7,2,C.staffGlowL);
  pt(x+17,y+5,C.staffGlowL);
  // glow aura around staff orb
  ctx.fillStyle='rgba(128,20,220,0.18)';ctx.beginPath();ctx.ellipse(x+17,y+7,7,7,0,0,Math.PI*2);ctx.fill();
}

// Horse (for riding scene)
function horse(x,y){
  // body
  px(x+5,y+8,28,14,C.horseB);px(x+7,y+9,24,11,C.horseL);
  // neck
  px(x+28,y+2,10,12,C.horseB);px(x+29,y+3,8,10,C.horseL);
  // head
  px(x+34,y,10,9,C.horseB);px(x+35,y+1,8,7,C.horseL);
  pt(x+39,y+3,'#201008'); // eye
  // mane
  px(x+28,y+1,5,4,C.horseMane);px(x+30,y,4,3,C.horseMane);
  // tail
  px(x+3,y+8,4,5,C.horseMane);px(x+1,y+11,4,8,C.horseMane);px(x,y+14,3,6,C.horseMane);
  // legs — trotting pose
  px(x+9,y+20,4,12,C.horseB);px(x+14,y+21,4,11,C.horseB);
  px(x+20,y+20,4,12,C.horseB);px(x+25,y+21,4,11,C.horseB);
  px(x+9,y+30,4,3,C.horseHoof);px(x+14,y+31,4,2,C.horseHoof);
  px(x+20,y+30,4,3,C.horseHoof);px(x+25,y+31,4,2,C.horseHoof);
  // nostril
  pt(x+42,y+5,C.horseBD);
  // saddlecloth
  px(x+12,y+9,14,8,C.kRed);px(x+13,y+10,12,6,C.kGold);
}

// ---- SCENES ----

// Scene 0: The empty room — Princess is gone
function drawS0(){
  // Antwerpshire castle interior — cold morning light
  px(0,0,W,H,C.roomW);
  for(var wy=0;wy<H;wy+=8){for(var wx=0;wx<W;wx+=20){px(wx,wy,18,7,C.roomS);}}
  // floor
  for(var fx=0;fx<W;fx+=14){px(fx,108,13,42,C.roomFloor);px(fx+13,108,1,42,C.roomFloorD);}
  px(0,108,W,2,'rgba(0,0,0,0.1)');
  // window — pale morning light (not the warm evening)
  px(W-55,10,40,55,'#604010');
  ctx.save();ctx.beginPath();ctx.rect(W-54,11,38,53);ctx.clip();
  // cool pale morning sky
  for(var gy=11;gy<64;gy++){
    var t=(gy-11)/53;
    ctx.fillStyle='rgb('+Math.round(160+t*30)+','+Math.round(175+t*25)+','+Math.round(195+t*20)+')';
    ctx.fillRect(0,gy,W,1);
  }
  ctx.restore();
  px(W-55,10,40,2,'#604010');px(W-55,63,40,2,'#604010');
  px(W-55,10,2,55,'#604010');px(W-17,10,2,55,'#604010');
  px(W-36,10,2,55,'#604010');px(W-55,37,40,2,'#604010');
  // pale glow through window onto floor (no warmth)
  ctx.fillStyle='rgba(180,190,210,0.09)';ctx.fillRect(W-55,10,40,110);
  // BED — side view, headboard left, footboard right
  // bed frame
  px(18,72,108,40,C.woodD);px(20,74,104,36,C.wood);
  // headboard — tall, left side
  px(14,45,14,67,C.woodD);px(15,46,12,65,C.wood);
  px(15,46,12,3,C.woodD); // top rail
  px(19,52,4,18,C.woodD);px(23,52,4,18,C.woodD); // vertical slats
  // finials on headboard posts
  circ(16,45,3,C.kGold);circ(26,45,3,C.kGold);
  // footboard — shorter, right side
  px(122,75,12,37,C.woodD);px(123,76,10,35,C.wood);
  px(123,76,10,3,C.woodD); // top rail
  px(125,82,3,12,C.woodD);px(129,82,3,12,C.woodD); // slats
  circ(124,75,3,C.kGold);circ(132,75,3,C.kGold);
  // mattress (on top of frame)
  px(22,68,100,8,C.laundry1);px(22,68,100,2,'#F4F0E8'); // mattress top highlight
  px(22,68,2,8,C.laundry2);px(120,68,2,8,C.laundry2);  // mattress sides
  // PILLOW — left side, slightly disturbed
  px(24,62,32,10,C.laundry1);px(25,63,30,8,'#EEEAE2');
  px(24,62,32,2,'#F4F0E8'); // pillow top highlight
  circ(38,68,4,'#E0DCD4'); // head indent in pillow
  // COVERS — thrown back to the right, rumpled
  // main cover bulk — piled up centre-right
  px(55,63,62,14,C.laundry2);px(56,64,60,12,C.laundry3);
  px(58,63,58,3,C.laundry1); // top fold highlight

  'It began, as trouble often does, without much warning.',

  '\u201cYou are ze Knight?\u201d said Fran\u00e7ois, looking him up and down with an expression that suggested the Knight had not entirely met expectations.',
  '\u201cI am,\u201d said the Knight.',
  '\u201cShe said you were taller,\u201d said Fran\u00e7ois.',
  // 33-37: riding to Ghentmoor
  '\u201cShe absolutely did not say that.\u201d',
  '\u201cNon,\u201d Fran\u00e7ois conceded, with a small wave of one leg. \u201cShe did not. But you should work on your posture regardless. Now. Listen carefully. Ze Princess is held in ze Old University of Ghentmoor, in ze east wing, third floor. Ghenta ze Grim \u2019as \u2019er serving ze peasants. Ze staff is ze source of \u2019er power \u2014 destroy ze staff and ze witch is \u2019armless. Ze peasants, without ze magic to back zem up, are simply \u2014\u201d he paused, searching for the right word \u2014 \u201cunpleasant. Which is manageable.\u201d',
  'The Knight stared at him. \u201cHow do you know all of this?\u201d',
  '\u201cI am an excellent observer,\u201d said Fran\u00e7ois. \u201cAlso I \u2019id in ze witch\u2019s hat for approximately forty-five minutes zis morning. It was not comfortable but it was informative.\u201d',
  'The Knight decided he liked this frog enormously.',
  // 38-45: the confrontation
  'He rode for Ghentmoor before the hour was out.',
  'Ghentmoor was exactly as unpleasant as advertised. The Knight arrived at dusk, when the grey city was at its greyest, and made his way through the winding streets toward the Old University with his hood up and his hand on his sword and Fran\u00e7ois riding in his breast pocket, occasionally offering directional commentary that was about seventy percent accurate.',
  'The University loomed at the end of a cobbled street like a building that had decided long ago to be as unwelcoming as architecturally possible and had succeeded admirably. The Knight slipped in through a side entrance, dispatched two peasant guards with the minimum of fuss \u2014 they were, as Fran\u00e7ois had predicted, more unpleasant than dangerous \u2014 and found the east wing staircase.',
  'Third floor. End of the corridor. He could hear Ghenta before he could see her \u2014 a sharp, irritable voice issuing a long list of complaints about the quality of the evening\u2019s service.',
  'He rounded the corner and there was the great hall of the east wing, lit by cold torches, full of grey-faced peasants \u2014 and there, in the middle of it all, was the Princess, carrying an enormous tray with the expression of someone mentally composing a very long list of grievances.',
  'Their eyes met across the hall.',
  'She looked, in order: relieved, delighted, and then immediately focused \u2014 because Ghenta the Grim had turned around.',
  'The witch was tall and angular, with the kind of face that had settled permanently into dissatisfaction, and she held her staff in one hand like an extension of her own bad mood. It crackled with dark energy at the tip. Her eyes found the Knight and narrowed.',
  // 46-53: the staff breaks
  '\u201cA visitor,\u201d she said, with the tone of someone for whom visitors were just another thing to be annoyed about. \u201cHow tedious.\u201d',
  'What followed was, by any measure, a significant commotion.',
  'The Knight drew his sword. The peasants surged forward with the enthusiasm of people who had been waiting for something to happen. Fran\u00e7ois, from the breast pocket, shouted instructions in French that were almost certainly unhelpful but were delivered with tremendous conviction. The Knight fought his way through the crowd \u2014 not elegantly, but effectively \u2014 and reached the Princess just as she had set down the tray with considerable purpose.',
  '\u201cYou came,\u201d she said.',
  '\u201cObviously,\u201d said the Knight.',
  'There was no time for more than that, because Ghenta was raising her staff.',
  'What the witch had not accounted for \u2014 what she could not have accounted for, because it had not yet been established as a pattern \u2014 was that the Princess, when the situation called for it, was considerably faster than she looked.',
  'Before the staff could discharge so much as a spark, the Princess crossed the distance between them in four quick strides, grabbed the staff with both hands, and brought it down across her knee with a crack that echoed through the entire Old University.',
  // 54-64: aftermath and riding home
  'The dark energy at the tip sputtered. Flickered. Went out.',
  'Ghenta the Grim stared at the two broken halves of her staff. Then at the Princess. Then at the staff again.',
  '\u201cThat,\u201d she said, in a very small voice, \u201cwas my staff.\u201d',
  '\u201cYes,\u201d said the Princess pleasantly. \u201cIt was.\u201d',
  'Without the magic crackling behind her, Ghenta the Grim was revealed to be exactly what she had always been underneath \u2014 a rather tired, rather cold, rather unhappy woman in a grey city who had run out of things to threaten people with. The peasants, sensing the shift, shuffled uncertainly and began, one by one, to find reasons to be somewhere else.',
  'The Knight looked at the Princess. The Princess looked at the Knight. François, from the breast pocket, looked at both of them.',
  '\u201cBien,\u201d said François, with great satisfaction. \u201cNow can we please leave zis terrible city.\u201d',
  'They rode out of Ghentmoor as the last of the evening light disappeared behind the grey horizon, and the Princess did not look back once. Not at the Old University, not at the cheerless streets, not at the city that had kept her for far too long.',
  'She looked forward, toward the road home, toward Antwerpshire, toward the warm lit windows and the cobbled streets and everything that waited for her there.',
  'Beside her, the Knight rode in silence for a while. Then, because he could not help it:',
  '\u201cYou broke the staff over your knee.\u201d',
  '\u201cI did,\u201d said the Princess.',
  '\u201cJust like that.\u201d',
  '\u201cIt wasn\u2019t that dramatic.\u201d',
  '\u201cIt was extremely dramatic,\u201d said the Knight. \u201cIt was one of the most dramatic things I have ever seen.\u201d',
  'The Princess considered this. \u201cGood,\u201d she said, and smiled.',
  'From the breast pocket, Fran\u00e7ois made a sound of deep Parisian contentment.',
  'They rode home through the dark, and the stars above Antwerpshire were very bright that night, and the Knight thought \u2014 not for the first time, and certainly not for the last \u2014 that he was the luckiest Knight in the entire kingdom.',
];

window.onload = function(){
  var textEl = document.getElementById('story-text');
  for(var pi=0; pi<storyParas.length; pi++){
    var pel = document.createElement('p');
    pel.id = 'para'+pi;
    pel.textContent = storyParas[pi];
    textEl.appendChild(pel);
  }
  var dotsRow = document.getElementById('dots-row');
  for(var d=0; d<scenes.length; d++){
    var de = document.createElement('div');
    de.className = 'dot'+(d===0?' on':'');
    dotsRow.appendChild(de);
  }
  var cur = 0;
  function render(i){
    ctx.clearRect(0,0,W,H);
    scenes[i].fn();
    document.getElementById('scene-name').textContent = scenes[i].label;
    document.getElementById('prev').disabled = (i===0);
    document.getElementById('next').disabled = (i===scenes.length-1);
    var allDots = document.querySelectorAll('.dot');
    for(var j=0;j<allDots.length;j++) allDots[j].classList.toggle('on',j===i);
    var allP = document.querySelectorAll('#story-text p');
    for(var k=0;k<allP.length;k++) allP[k].classList.remove('hl');
    for(var h=scenes[i].para;h<=scenes[i].paraEnd;h++){
      if(allP[h]) allP[h].classList.add('hl');
    }
    if(allP[scenes[i].para]) allP[scenes[i].para].scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  document.getElementById('prev').onclick = function(){if(cur>0){cur--;render(cur);}};
  document.getElementById('next').onclick = function(){if(cur<scenes.length-1){cur++;render(cur);}};
  sizeCanvas();
  render(0);
  window.addEventListener('resize', sizeCanvas);
};
</script>
</body>
